<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardias 2026</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; text-align: center; padding: 20px; }
        h1 { color: #333; }
        
        /* Referencias de técnicos */
        .tecnicos { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; font-weight: bold; }
        .tecnico { padding: 10px 20px; border-radius: 5px; color: white; }
        .castro { background-color: red; }
        .inorio { background-color: blue; }

        /* Contenedor del calendario */
        .calendario-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 20px; 
            padding: 20px;
        }

        .mes { background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); padding: 10px; }
        .mes h3 { margin-top: 0; text-transform: uppercase; color: #555; }

        .dias-grilla { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); /* Solo Lunes a Viernes */
            gap: 5px; 
        }

        .dia-header { font-weight: bold; font-size: 0.8em; padding-bottom: 5px; border-bottom: 1px solid #ddd; }
        .dia { 
            padding: 10px 5px; 
            border: 1px solid #eee; 
            border-radius: 4px; 
            font-size: 0.9em; 
            min-height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Marcador de día actual */
        .hoy { border: 3px solid red !important; font-weight: bold; }

        /* Colores de Guardia */
        .guardia-castro { background-color: red !important; color: white; }
        .guardia-inorio { background-color: blue !important; color: white; }
    </style>
</head>
<body>

    <h1>GUARDIAS 2026</h1>

    <div class="tecnicos">
        <div class="tecnico castro">CASTRO GASTÓN</div>
        <div class="tecnico inorio">INORIO MARIANO</div>
    </div>

    <div id="calendario" class="calendario-container"></div>

    <script>
        const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
        const diasSemana = ["Lun", "Mar", "Mié", "Jue", "Vie"];
        const hoy = new Date();
        const contenedor = document.getElementById('calendario');

        function generarCalendario() {
            for (let m = 0; m < 12; m++) {
                let divMes = document.createElement('div');
                divMes.className = 'mes';
                divMes.innerHTML = `<h3>${meses[m]}</h3>`;

                let grilla = document.createElement('div');
                grilla.className = 'dias-grilla';

                // Encabezados de días
                diasSemana.forEach(d => {
                    let h = document.createElement('div');
                    h.className = 'dia-header';
                    h.innerText = d;
                    grilla.appendChild(h);
                });

                // Obtener primer día y cantidad de días del mes
                let fecha = new Date(2026, m, 1);
                let ultimoDia = new Date(2026, m + 1, 0).getDate();

                for (let d = 1; d <= ultimoDia; d++) {
                    let fechaActual = new Date(2026, m, d);
                    let diaSemanaIndex = fechaActual.getDay(); // 0=Dom, 1=Lun...

                    // Filtrar solo Lunes (1) a Viernes (5)
                    if (diaSemanaIndex >= 1 && diaSemanaIndex <= 5) {
                        let divDia = document.createElement('div');
                        divDia.className = 'dia';
                        divDia.innerText = d;

                        // Resaltar día actual (si estamos en 2026)
                        if (hoy.getFullYear() === 2026 && hoy.getMonth() === m && hoy.getDate() === d) {
                            divDia.classList.add('hoy');
                        }

                        // Asignación de Guardias Marzo
                        if (m === 2) { // Marzo es índice 2
                            if (d >= 1 && d <= 15) {
                                divDia.classList.add('guardia-inorio');
                            } else if (d >= 16 && d <= 31) {
                                divDia.classList.add('guardia-castro');
                            }
                        }

                        grilla.appendChild(divDia);
                    }
                }
                divMes.appendChild(grilla);
                contenedor.appendChild(divMes);
            }
        }

        generarCalendario();
    </script>

</body>
</html>
