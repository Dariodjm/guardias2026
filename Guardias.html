<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardias 2026 - Inicio</title>
    <style>
        /* Estilo general fondo Verde Windows 98 */
        body {
            background-color: #008080; 
            font-family: "Tahoma", "Geneva", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Ventana principal */
        .window {
            background-color: #c0c0c0;
            width: 400px;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            padding: 2px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        /* Barra de título de la ventana */
        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            padding: 3px 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 13px;
        }

        .title-bar-text {
            display: flex;
            align-items: center;
        }

        .window-body {
            padding: 20px;
            text-align: center;
        }

        p {
            font-size: 14px;
            margin-bottom: 20px;
            color: #000;
        }

        /* El famoso botón estilo Windows 98 */
        .btn-win98 {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            background-color: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #404040 #404040 #ffffff;
            text-decoration: none;
            color: black;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
        }

        /* Efecto al hacer click (hundido) */
        .btn-win98:active {
            border-color: #404040 #ffffff #ffffff #404040;
            padding: 11px 9px 9px 11px; /* Desplazamiento visual */
        }

        .btn-win98:focus {
            outline: 1px dotted #000;
            outline-offset: -5px;
        }

        /* Icono decorativo */
        .icon {
            margin-bottom: 10px;
            font-size: 40px;
        }
    </style>
</head>
<body>

    <div class="window">
        <div class="title-bar">
            <div class="title-bar-text">
                <span>Guardias_2026.exe</span>
            </div>
        </div>
        <div class="window-body">
            <div class="icon">🖥️</div>
            <p><strong>Seleccione base para continuar:</strong></p>
            
            <a href="Cordoba.html" class="btn-win98">CÓRDOBA</a>
            <a href="Posadas.html" class="btn-win98">POSADAS</a>
            <a href="Rosario.html" class="btn-win98">ROSARIO</a>
            <a href="Tucuman.html" class="btn-win98">TUCUMÁN</a>
        </div>
    </div>

</body>
</html>
