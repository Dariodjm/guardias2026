<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardias 2026 - Rosario</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 20px;
            color: #333;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            text-transform: uppercase;
        }

        .leyenda {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .tecnico {
            display: flex;
            align-items: center;
            font-weight: bold;
        }

        .color-box {
            width: 20px;
            height: 20px;
            margin-right: 8px;
            border-radius: 3px;
        }

        .calendario-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .mes {
            background: white;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .mes h3 {
            text-align: center;
            color: #e67e22;
            margin-top: 0;
            text-transform: capitalize;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            font-size: 0.8em;
            color: #7f8c8d;
            padding-bottom: 5px;
        }

        td {
            text-align: center;
            padding: 8px 0;
            border: 1px solid #eee;
            font-size: 0.9em;
            width: 14.28%;
        }

        /* Colores de Guardia - Ahora aplican a cualquier día */
        .guardia-martinez {
            background-color: #ff0000 !important;
            color: white !important;
            font-weight: bold;
        }

        .guardia-pistone {
            background-color: #0000ff !important;
            color: white !important;
            font-weight: bold;
        }

        /* Marcador de día actual */
        .hoy {
            outline: 3px solid #ff0000;
            outline-offset: -3px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>GUARDIAS 2026 (ROSARIO)</h1>

    <div class="leyenda">
        <div class="tecnico">
            <div class="color-box" style="background-color: red;"></div>
            MARTINEZ GUSTAVO
        </div>
        <div class="tecnico">
            <div class="color-box" style="background-color: blue;"></div>
            PISTONE LUCAS
        </div>
    </div>

    <div id="calendario" class="calendario-container"></div>

    <script>
        const meses = ["enero", "febrero", "marzo", "abril", "mayo", "junio", "julio", "agosto", "septiembre", "octubre", "noviembre", "diciembre"];
        const diasSemana = ["Lun", "Mar", "Mie", "Jue", "Vie", "Sab", "Dom"];
        
        // RANGOS DE GUARDIAS (Año, Mes-1, Día)
        const rangos = [
            { inicio: new Date(2026, 1, 24), fin: new Date(2026, 2, 16), clase: 'guardia-martinez' },
            { inicio: new Date(2026, 2, 17), fin: new Date(2026, 3, 7), clase: 'guardia-pistone' }
        ];

        const hoy = new Date();
        const container = document.getElementById('calendario');

        for (let m = 0; m < 12; m++) {
            let html = `<div class="mes"><h3>${meses[m]}</h3><table><thead><tr>`;
            diasSemana.forEach(d => html += `<th>${d}</th>`);
            html += `</tr></thead><tbody><tr>`;

            let fecha = new Date(2026, m, 1);
            let primerDiaSemana = fecha.getDay(); 
            // Ajuste para que la semana empiece en Lunes
            let ajusteInicio = (primerDiaSemana === 0) ? 6 : primerDiaSemana - 1;

            for (let i = 0; i < ajusteInicio; i++) {
                html += `<td></td>`;
            }

            while (fecha.getMonth() === m) {
                let celdaClase = "";
                
                // Marcador de día actual (Compara año, mes y día)
                let esHoy = (
                    fecha.getDate() === hoy.getDate() && 
                    fecha.getMonth() === hoy.getMonth() && 
                    fecha.getFullYear() === hoy.getFullYear()
                ) ? "hoy" : "";

                // Lógica de pintado de guardias: AHORA INCLUYE SÁBADOS Y DOMINGOS
                rangos.forEach(rango => {
                    // Normalizamos las fechas para comparar solo año/mes/día sin horas
                    const d = new Date(fecha.getFullYear(), fecha.getMonth(), fecha.getDate());
                    const inicio = new Date(rango.inicio.getFullYear(), rango.inicio.getMonth(), rango.inicio.getDate());
                    const fin = new Date(rango.fin.getFullYear(), rango.fin.getMonth(), rango.fin.getDate());

                    if (d >= inicio && d <= fin) {
                        celdaClase = rango.clase;
                    }
                });

                html += `<td class="${celdaClase} ${esHoy}">${fecha.getDate()}</td>`;

                // Si es domingo, cerramos fila y abrimos otra
                if (fecha.getDay() === 0) html += `</tr><tr>`;
                
                fecha.setDate(fecha.getDate() + 1);
            }

            html += `</tr></tbody></table></div>`;
            container.innerHTML += html;
        }
    </script>
</body>
</html>
